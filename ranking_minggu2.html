<!DOCTYPE html>

<html>

<head>

<title>Ranking Tryout TKJ</title>

<style>
.btn-home{
display:inline-block;
margin-top:15px;
padding:10px 20px;
background:#2c7be5;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.btn-home:hover{
background:#1a5bb8;
}
body{
font-family:Arial;
background:#eef5ee;
text-align:center;
padding:40px;
}

table{
margin:auto;
border-collapse:collapse;
width:600px;
background:white;
}

th,td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#2e7d32;
color:white;
}

</style>

</head>

<body>

<h2>🏆 Ranking Tryout TKJ</h2>
  <div id="statistik" style="margin-bottom:20px;font-size:18px;"></div>

<table id="ranking">

<tr>
<th>Rank</th>
<th>Nama</th>
<th>Kelas</th>
<th>Nilai</th>
</tr>

</table>

<br>

<a href="minggu2.html">⬅ Kembali ke Tryout</a>
<br><br>

<a href="https://helmiyunar8.github.io/Materi-TKJ/index.html" class="btn-home">
🏠 Kembali ke Beranda LMS
</a>

<script>

let url="https://docs.google.com/spreadsheets/d/e/2PACX-1vRdV-1HI9fjOTONt0DwarFqdOlhlGBOCNIPWy9zoX0KxH98yFwmFIvvEBZtwLpRBwGBByl8gmK6KZ4S/pub?gid=1828634055&single=true&output=csv"

fetch(url)

.then(res=>res.text())

.then(data=>{

let rows=data.split("\n").slice(1)

let siswa=[]

rows.forEach(r=>{

let c=r.split(",")

siswa.push({
nama:c[1],
kelas:c[2],
nilai:parseInt(c[3])
})

})

siswa.sort((a,b)=>b.nilai-a.nilai)
let total=0

siswa.forEach(s=>{
total+=s.nilai
})

let rata=Math.round(total/siswa.length)

let tertinggi=siswa[0].nilai

document.getElementById("statistik").innerHTML=
"📊 Peserta : "+siswa.length+
" | 📈 Rata-rata : "+rata+
" | 🥇 Nilai tertinggi : "+tertinggi
let table=document.getElementById("ranking")

siswa.forEach((s,i)=>{

table.innerHTML+=`

<tr>

<td>${i+1}</td>

<td>${s.nama}</td>

<td>${s.kelas}</td>

<td>${s.nilai}</td>

</tr>

`

})

})

</script>

</body>

</html>
