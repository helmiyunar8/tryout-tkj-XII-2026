/* RANDOM 40 SOAL */

bankSoal.sort(()=>Math.random()-0.5)
let soal=bankSoal.slice(0,40)
soal.forEach(s=>acakPilihan(s))

let pos=0
let jawab=[]
let waktu=60*60

function mulai(){
login.style.display="none"
ujian.style.display="block"
buatNomor()
tampil()
timer()
}

function timer(){
setInterval(function(){
let m=Math.floor(waktu/60)
let s=waktu%60
timer.innerHTML="Sisa waktu : "+m+":"+s
waktu--
if(waktu<0){selesai()}
},1000)
}

function buatNomor(){
let html=""
for(let i=0;i<40;i++){
html+=`<div onclick="lompat(${i})">${i+1}</div>`
}
nomor.innerHTML=html
}
function acakPilihan(soal){

let arr=soal.o.map((opsi,i)=>({text:opsi,benar:(i==soal.a)}))

arr.sort(()=>Math.random()-0.5)

soal.o=arr.map(x=>x.text)
soal.a=arr.findIndex(x=>x.benar)

}
function tampil(){

let s=soal[pos]

pertanyaan.innerHTML=(pos+1)+". "+s.t +
(s.img ? `<br><img src="${s.img}" style="max-width:100%;margin-top:10px;">` : "")

let html=""

s.o.forEach((o,i)=>{

html+=`
<label>
<input type="radio" name="opsi" value="${i}"
${jawab[pos]==i?"checked":""}
onchange="pilih(${i})">
${String.fromCharCode(65+i)}. ${o}
</label><br>
`

})

opsi.innerHTML=html
}
function pilih(i){
jawab[pos]=i

let kotak=document.querySelectorAll("#nomor div")
kotak[pos].classList.add("jawab")
}
function next(){ if(pos<39){pos++; tampil()} }
function prev(){ if(pos>0){pos--; tampil()} }

function lompat(i){ pos=i; tampil() }

function selesai(){

let belum=0

for(let i=0;i<soal.length;i++){
if(jawab[i]==undefined) belum++
}

if(belum>0){
let lanjut=confirm("Masih ada "+belum+" soal belum dijawab.\nYakin ingin menyelesaikan ujian?")
if(!lanjut){return}
}

let benar=0

soal.forEach((s,i)=>{
if(jawab[i]==s.a) benar++
})

let salah=40-benar
let nilai=Math.round((benar/40)*100)

localStorage.setItem("hasil_tryout",JSON.stringify({
nama:nama.value,
kelas:kelas.value,
benar:benar,
salah:salah,
nilai:nilai
}))

fetch(scriptURL,{
method:"POST",
body:JSON.stringify({
nama:nama.value,
kelas:kelas.value,
nilai:nilai
})
})
.then(res=>res.text())
.then(data=>{
window.location="hasil_minggu2.html"
})
}
