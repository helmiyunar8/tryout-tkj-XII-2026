<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TRYOUT TKJ MINGGU 2</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef5ee;
}

header{
background:#2e7d32;
color:white;
text-align:center;
padding:15px;
}

.container{
max-width:500px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.timer{
color:red;
font-weight:bold;
margin-bottom:10px;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:10px;
border-radius:6px;
margin-top:10px;
width:100%;
}

.nav{
display:flex;
gap:10px;
}

.nomor{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
margin-top:15px;
}

.nomor div{
background:#c8e6c9;
padding:8px;
text-align:center;
border-radius:4px;
}

</style>

</head>

<body>

<header>
<h3>TRYOUT TKJ</h3>
SMKN 7 LUWU
</header>

<div class="container">

<div id="login" class="card">

Nama<br> <input id="nama" style="width:100%"><br><br>

Kelas<br> <select id="kelas" style="width:100%">

<option>X TKJ</option>
<option>XI TKJ</option>
<option>XII TKJ</option>
</select>

<button onclick="mulai()">Mulai Ujian</button>

</div>

<div id="ujian" style="display:none">

<div class="card">

<div class="timer" id="timer"></div>

<h3 id="pertanyaan"></h3>

<div id="opsi"></div>

<div class="nav">
<button onclick="prev()">Sebelumnya</button>
  function lompat(i){
pos=i
tampil()
}
<button onclick="next()">Selanjutnya</button>
</div>

<button onclick="selesai()">Selesai Ujian</button>

</div>

<div class="card nomor" id="nomor"></div>

</div>

</div>

<script>

let scriptURL="PASTE_SCRIPT_URL"

let soal=[
{t:"Topologi berbentuk bintang",o:["Star","Bus","Ring","Mesh","Tree"],a:0},
{t:"Alamat website disebut",o:["URL","IP","DNS","FTP","HTTP"],a:0},
{t:"Jumlah layer OSI",o:["5","6","7","8","9"],a:2},
{t:"Media transmisi kabel",o:["UTP","Wifi","Bluetooth","Infrared","Satelit"],a:0},
{t:"Kepanjangan LAN",o:["Local Area Network","Line Area Net","Long Area Net","Link Area Net","Large Area Net"],a:0}
]

while(soal.length<25){
soal=soal.concat(soal)
}

soal=soal.slice(0,25)

let pos=0
let jawab=[]
let waktu=60*60

function mulai(){
login.style.display="none"
ujian.style.display="block"
buatNomor()
tampil()
timer()
}

function timer(){

setInterval(function(){

let m=Math.floor(waktu/60)
let s=waktu%60

document.getElementById("timer").innerHTML="Sisa waktu : "+m+":"+s

waktu--

if(waktu<0){
selesai()
}

},1000)

}

function buatNomor(){

let html=""

for(let i=0;i<25;i++){

html+=`<div onclick="lompat(${i})">${i+1}</div>`

}

nomor.innerHTML=html

}

function tampil(){

let s=soal[pos]

pertanyaan.innerHTML=(pos+1)+". "+s.t

let html=""

s.o.forEach((o,i)=>{

html+=`
<label>
<input type="radio" name="opsi" value="${i}" onchange="jawab[pos]=${i}">
${String.fromCharCode(65+i)}. ${o}
</label><br>
`

})

opsi.innerHTML=html

}

function next(){
if(pos<24){pos++; tampil()}
}

function prev(){
  function lompat(i){
pos=i
tampil()
}
if(pos>0){pos--; tampil()}
}

function selesai(){

let benar=0

soal.forEach((s,i)=>{
if(jawab[i]==s.a) benar++
})

let nilai=Math.round((benar/25)*100)

alert("Nilai kamu : "+nilai)

fetch(scriptURL,{
method:"POST",
body:JSON.stringify({
nama:nama.value,
kelas:kelas.value,
nilai:nilai
})
})

}

</script>

</body>
</html>
