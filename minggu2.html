        /* UJIAN LAYOUT */
        #ujian-section { display: none; gap: 25px; flex-wrap: wrap; }
        .soal-area { flex: 3; min-width: 300px; }
        .nomor-area { flex: 1; min-width: 250px; position: sticky; top: 100px; height: fit-content; }

        .timer-box {

        /* OPTIONS */
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .option-label {
            display: flex; align-items: center; padding: 18px 25px; background: #fdfdfd;

        .option-label.selected { border-color: var(--gold); background: #fffcf0; font-weight: 800; }
        .option-label input { margin-right: 15px; transform: scale(1.3); accent-color: var(--gold); }

        /* NOMOR NAVIGATION */
        .nomor-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .no-btn {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            background: #f0f0f0; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 14px; transition: 0.2s;
        }
        .no-btn.active { background: var(--gold) !important; color: white; border: 2px solid #b8860b; transform: scale(1.1); }
        .no-btn.filled { background: #333; color: white; }

        /* BUTTONS */
        .nav-footer { display: flex; justify-content: space-between; margin-top: 30px; gap: 15px; }
        .btn { padding: 15px 30px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-prev { background: #eee; color: #666; }

            {t:"VLAN high performance",img:"",o:["Biaya","Broadcast kecil","Kurangi device","Manajemen","Geografi"],a:1},
            {t:"Broadcast storm mitigation",img:"",o:["Biaya","Broadcast kecil","Kurangi device","Manajemen","Geografi"],a:1},
            {t:"IT staff efficiency",img:"",o:["Biaya","Broadcast kecil","Kurangi device","Manajemen","Geografi"],a:3},
            {t:"VLAN security",img:"",o:["Keamanan data","Broadcast kecil","Kurangi device","Manajemen","Geografi"],a:0},
            {t:"Range VLAN",img:"",o:["Skala kecil","Token ring","Default","Database","Manajemen"],a:0},
            {t:"MAC based VLAN",img:"",o:["Port","MAC","Protocol","IP subnet","Auth"],a:1},
            {t:"Protocol based VLAN",img:"",o:["Port","MAC","Protocol","IP subnet","Auth"],a:2},
            {t:"Cara mematikan komputer",img:"gambar/pc.png",o:["Cabut listrik","Cabut kabel","Shutdown","Power monitor","Power CPU"],a:2}
        ];

        function acakPilihan(item) {
            let options = item.o.map((text, i) => ({ text, isCorrect: i === item.a }));
            options.sort(() => Math.random() - 0.5);
            item.o = options.map(opt => opt.text);
            item.a = options.findIndex(opt => opt.isCorrect);
        }

        bankSoal.sort(() => Math.random() - 0.5);
        let soalAktif = bankSoal.slice(0, 40);
        soalAktif.forEach(acakPilihan);

        let pos = 0;
        let jawabanSiswa = [];
        let sisaWaktu = 60 * 60;
        let timerInterval;

        function mulaiUjian() {
            if(!document.getElementById("nama_user").value) return alert("Wajib Isi Nama Lengkap!");
            document.getElementById("login-box").style.display = "none";
            document.getElementById("ujian-section").style.display = "flex";
            generateNomor();
            tampilkanSoal();
            startTimer();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                let m = Math.floor(sisaWaktu / 60);
                let s = sisaWaktu % 60;
                document.getElementById("timer_label").innerHTML = `⌛ Sisa Waktu : ${m}:${s < 10 ? '0'+s : s}`;
                if(sisaWaktu <= 0) selesai();
                sisaWaktu--;
            }, 1000);
        }

        function generateNomor() {
            let html = "";
            for (let i = 0; i < 40; i++) {
                html += `<div class="no-btn" id="no-${i}" onclick="lompat(${i})">${i + 1}</div>`;
            }
            document.getElementById("nomor-grid").innerHTML = html;
        }

        function tampilSoal() {
            let s = soalAktif[pos];
            document.getElementById("pertanyaan-text").innerHTML = `${pos + 1}. ${s.t}`;
            document.getElementById("img-container").innerHTML = s.img ? `<img src="${s.img}" class="soal-img">` : "";
            let html = "";
            s.o.forEach((opsi, i) => {
                let isChecked = jawabanSiswa[pos] === i ? "checked" : "";
                let isSelected = jawabanSiswa[pos] === i ? "selected" : "";
                html += `
                    <label class="option-label ${isSelected}">
                        <input type="radio" name="pilihan" onchange="pilih(${i})" ${isChecked}>
                        ${String.fromCharCode(65 + i)}. ${opsi}
                    </label>
                `;
            });
            document.getElementById("opsi-container").innerHTML = html;
            document.querySelectorAll(".no-btn").forEach(el => el.classList.remove("active"));
            document.getElementById(`no-${pos}`).classList.add("active");
        }

        function pilih(idx) {
            jawabanSiswa[pos] = idx;
            document.getElementById(`no-${pos}`).classList.add("filled");
            tampilkanSoal();
        }

        function next() { if(pos < 39) { pos++; tampilSoal(); } }
        function prev() { if(pos > 0) { pos--; tampilkanSoal(); } }
        function lompat(i) { pos = i; tampilSoal(); }

        function selesai() {
            let kosong = 40 - jawabanSiswa.filter(x => x !== undefined).length;
            if(kosong > 0 && sisaWaktu > 0) {
                if(!confirm(`Ada ${kosong} soal belum dijawab. Yakin ingin selesai?`)) return;
            }
            clearInterval(timerInterval);
            let benar = 0;
            soalAktif.forEach((s, i) => { if(jawabanSiswa[i] === s.a) benar++; });
            let nilai = Math.round((benar / 40) * 100);
            localStorage.setItem("hasil_tryout", JSON.stringify({
                nama: document.getElementById("nama_user").value,
                kelas: document.getElementById("kelas_user").value,
                benar: benar, salah: 40 - benar, nilai: nilai
            }));
            fetch(scriptURL, {
                method: "POST", mode: "no-cors",
                body: JSON.stringify({
                    nama: document.getElementById("nama_user").value,
                    kelas: document.getElementById("kelas_user").value,
                    nilai: nilai
                })
            }).then(() => { window.location = "hasil_minggu2.html"; });
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }
