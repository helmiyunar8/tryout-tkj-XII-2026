<!DOCTYPE html>

<html>

<head>

<title>Hasil Tryout TKJ</title>

<style>

body{
font-family:Arial;
background:#eef5ee;
text-align:center;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

h2{
margin-bottom:20px;
}

.nilai{
font-size:28px;
font-weight:bold;
margin:20px;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:12px;
border-radius:6px;
margin:8px;
width:200px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>HASIL TRYOUT TKJ</h2>

<p id="nama"></p>
<p id="kelas"></p>

<br>

<p id="benar"></p>
<p id="salah"></p>

<div class="nilai" id="nilai"></div>

<button onclick="sertifikat()">Download Sertifikat</button>

<br>

<a href="ranking_minggu2.html">Lihat Ranking</a>

</div>

<script>

let data=JSON.parse(localStorage.getItem("hasil_tryout"))

document.getElementById("nama").innerHTML="Nama : "+data.nama
document.getElementById("kelas").innerHTML="Kelas : "+data.kelas

document.getElementById("benar").innerHTML="Benar : "+data.benar
document.getElementById("salah").innerHTML="Salah : "+data.salah

document.getElementById("nilai").innerHTML="Nilai : "+data.nilai

function sertifikat(){

let canvas=document.createElement("canvas")
canvas.width=1000
canvas.height=600

let ctx=canvas.getContext("2d")

// background
ctx.fillStyle="#ffffff"
ctx.fillRect(0,0,1000,600)

// border
ctx.strokeStyle="#2e7d32"
ctx.lineWidth=8
ctx.strokeRect(20,20,960,560)

// judul
ctx.fillStyle="#2e7d32"
ctx.font="bold 40px Arial"
ctx.textAlign="center"
ctx.fillText("SERTIFIKAT TRYOUT TKJ",500,120)

// sekolah
ctx.font="24px Arial"
ctx.fillText("SMKN 7 LUWU",500,160)

// isi sertifikat
ctx.fillStyle="#000"
ctx.font="26px Arial"

ctx.fillText("Nama : "+data.nama,500,260)
ctx.fillText("Kelas : "+data.kelas,500,320)

ctx.fillStyle="#2e7d32"
ctx.font="bold 40px Arial"
ctx.fillText("Nilai : "+data.nilai,500,420)

// tanggal
let tgl=new Date().toLocaleDateString()

ctx.fillStyle="#000"
ctx.font="20px Arial"
ctx.fillText("Tanggal : "+tgl,500,500)

// download PNG
let link=document.createElement("a")
link.download="sertifikat_tryout.png"
link.href=canvas.toDataURL("image/png")
link.click()

}

</script>

</body>

</html>
