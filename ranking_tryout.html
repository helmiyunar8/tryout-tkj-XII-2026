<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard Tryout TKJ - Helmi Yunar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2e7d32;
            --dark: #1b5e20;
            --gold: #D4AF37;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
            --white: #ffffff;
            --bg: #f4f7f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background-color: var(--bg);
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        /* HEADER */
        .header-section {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 50px 20px;
            text-align: center;
            border-bottom: 8px solid var(--gold);
            margin-bottom: 40px;
        }
        .header-section i { font-size: 50px; color: var(--gold); margin-bottom: 15px; }
        .header-section h2 { font-size: 32px; font-weight: 900; letter-spacing: 1px; }

        /* TABLE CONTAINER */
        .leaderboard-card {
            width: 90%;
            max-width: 700px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #eee;
        }

        table { width: 100%; border-collapse: collapse; }
        
        th {
            background: #f8f9fa;
            color: #888;
            padding: 20px;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1.5px;
            text-align: left;
            border-bottom: 2px solid #eee;
        }

        td { padding: 18px 20px; border-bottom: 1px solid #f1f1f1; font-size: 16px; }

        /* RANKING STYLES */
        .rank-col { width: 80px; text-align: center; font-weight: 800; font-size: 18px; }
        .name-col { font-weight: 700; color: #2c3e50; }
        .score-col { width: 100px; text-align: center; font-weight: 900; color: var(--primary); font-size: 18px; }

        /* HIGHLIGHT TOP 3 */
        .top-1 { background: #fffcf0 !important; }
        .top-1 .rank-col { color: var(--gold); font-size: 24px; }
        
        .top-2 { background: #f8f9fa !important; }
        .top-2 .rank-col { color: var(--silver); }
        
        .top-3 { background: #fdf5f0 !important; }
        .top-3 .rank-col { color: var(--bronze); }

        /* BUTTONS */
        .btn-back {
            margin-top: 30px;
            padding: 12px 25px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        .btn-back:hover { background: var(--dark); transform: translateY(-3px); }

        /* LOADING SPINNER */
        .loading { padding: 40px; text-align: center; color: #999; font-style: italic; }

        @media (max-width: 500px) {
            .leaderboard-card { width: 95%; }
            th:nth-child(3), td:nth-child(3) { display: none; } /* Sembunyikan kelas di HP */
            td { padding: 15px 10px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <i class="fas fa-trophy"></i>
        <h2>RANKING TRYOUT TKJ</h2>
        <p style="opacity: 0.8; font-weight: 500; margin-top: 5px;">SMKN 7 LUWU • Jaringan Komputer & Telekomunikasi</p>
    </div>

    <div class="leaderboard-card">
        <table>
            <thead>
                <tr>
                    <th style="text-align:center">Pos</th>
                    <th>Nama Siswa</th>
                    <th>Kelas</th>
                    <th style="text-align:center">Skor</th>
                </tr>
            </thead>
            <tbody id="ranking-body">
                <tr>
                    <td colspan="4" class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Menghitung peringkat siswa...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <a href="minggu1.html" class="btn-back">
        <i class="fas fa-arrow-left"></i> KEMBALI KE HALAMAN UJIAN
    </a>

    <script>
        // URL Sesuai Kode Bapak
        const url = "https://api.allorigins.win/raw?url=https://docs.google.com/spreadsheets/d/e/2PACX-1vQZDMdaC8pbL27aaOkWfNKG73AZg120HUUGiJA7X5oPn1xKrQUEKuRAShEgJrUtikOn5ky5Fv2A5LKy/pub?output=csv";

        fetch(url)
            .then(res => res.text())
            .then(data => {
                let rows = data.trim().split("\n").slice(1);
                let siswa = [];

                rows.forEach(r => {
                    let c = r.split(/,|;/); // Antisipasi koma atau titik koma
                    if(c.length >= 4) {
                        siswa.push({
                            nama: c[1].replace(/"/g, ""),
                            kelas: c[2].replace(/"/g, ""),
                            nilai: parseInt(c[3]) || 0
                        });
                    }
                });

                // Urutkan nilai tertinggi
                siswa.sort((a, b) => b.nilai - a.nilai);

                let html = "";
                siswa.forEach((s, i) => {
                    let rankIcon = i + 1;
                    let rowClass = "";

                    // Logika Medali
                    if(i === 0) { rankIcon = "🥇"; rowClass = "top-1"; }
                    else if(i === 1) { rankIcon = "🥈"; rowClass = "top-2"; }
                    else if(i === 2) { rankIcon = "🥉"; rowClass = "top-3"; }

                    html += `
                        <tr class="${rowClass}">
                            <td class="rank-col">${rankIcon}</td>
                            <td class="name-col">${s.nama.toUpperCase()}</td>
                            <td style="color: #777;">${s.kelas}</td>
                            <td class="score-col">${s.nilai}</td>
                        </tr>
                    `;
                });

                document.getElementById("ranking-body").innerHTML = html;
            })
            .catch(err => {
                document.getElementById("ranking-body").innerHTML = "<tr><td colspan='4' style='text-align:center;'>Gagal mengambil data peringkat.</td></tr>";
            });
    </script>

</body>
</html>
