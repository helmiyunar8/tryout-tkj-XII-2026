let posisi=0
let jawaban=[]

function mulai(){

nama=document.getElementById("nama").value
kelas=document.getElementById("kelas").value

if(nama==""||kelas==""){
alert("Isi nama dan kelas")
return
}

document.getElementById("login").style.display="none"
document.getElementById("ujian").style.display="block"

buatNomor()
tampil()

}

function buatNomor(){

let html=""

for(let i=0;i<soal.length;i++){
html+="<div onclick='lompat("+i+")'>"+(i+1)+"</div>"
}

document.getElementById("nomor").innerHTML=html

}

function tampil(){

let s=soal[posisi]

document.getElementById("soal").innerHTML=(posisi+1)+". "+s.t

let html=""

let pilihan = s.o.map((text, index) => ({text, index}));
pilihan = pilihan.sort(() => Math.random() - 0.5);

pilihan.forEach((item,i)=>{

html+=`
<label>
<input type="radio" name="opsi" value="${item.index}" ${jawaban[posisi]==item.index?"checked":""}>
${String.fromCharCode(65+i)}. ${item.text}
</label><br>
`

})

document.getElementById("opsi").innerHTML=html

}

function simpan(){

let pilih=document.querySelector('input[name="opsi"]:checked')

if(pilih) jawaban[posisi]=Number(pilih.value)

}

function next(){
simpan()
if(posisi<soal.length-1){posisi++;tampil()}else{selesai()}
}

function prev(){
simpan()
if(posisi>0){posisi--;tampil()}
}

function lompat(i){
simpan()
posisi=i
tampil()
}

function selesai(){

simpan()

let benar=0

soal.forEach((s,i)=>{
if(jawaban[i]==s.a) benar++
})

let nilai=Math.round((benar/soal.length)*100)

document.getElementById("ujian").style.display="none"

document.getElementById("hasil").style.display="block"

document.getElementById("hasil").innerHTML=

`
<h2>HASIL UJIAN</h2>

Nama : ${nama}<br>
Kelas : ${kelas}<br><br>

Nilai : ${nilai}
`

fetch("https://script.google.com/macros/s/AKfycbx3X3-cdIOgs_CR03ZHPjQyTgBQJOtoInX7s9bMkCchRQot0zwlrkMyOuqKCofTmZGSTw/exec",{

method:"POST",

body:JSON.stringify({

nama:nama,
kelas:kelas,
nilai:nilai

})

})

}

</script>
