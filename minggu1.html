<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>TRYOUT UJIAN TKJ</title>

<style>

body{
font-family:Arial;
background:#eef5ee;
margin:0;
}

header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
display:flex;
gap:30px;
}

.soal-area{
flex:3;
}

.nomor-area{
flex:1;
}

.timer{
color:red;
font-weight:bold;
margin-bottom:15px;
}

.nomor-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
}

.nomor-grid div{
padding:8px;
background:#c8e6c9;
text-align:center;
border-radius:4px;
cursor:pointer;
}

.aktif{
background:#2e7d32 !important;
color:white;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:10px 16px;
margin-top:10px;
cursor:pointer;
border-radius:6px;
}

</style>

</head>

<body>

<header>
<h2>TRYOUT UJIAN TKJ</h2>
SMKN 7 LUWU
</header>

<div class="container">

<div id="login">

Nama<br> <input id="nama"><br><br>

Kelas<br> <select id="kelas">

<option value="">Pilih kelas</option>
<option>X TKJ</option>
<option>XI TKJ</option>
<option>XII TKJ</option>
</select>

<br><br>

<button onclick="mulai()">Mulai Ujian</button>

</div>

<div id="ujian" style="display:none;width:100%;display:flex;gap:30px;">

<div class="soal-area">

<div class="timer" id="timer"></div>

<h3 id="soal"></h3>

<div id="opsi"></div>

<br>

<button onclick="prev()">Sebelumnya</button> <button onclick="next()">Selanjutnya</button> <button onclick="selesai()">Selesai Ujian</button>

</div>

<div class="nomor-area">

<h4>NOMOR SOAL</h4>

<div class="nomor-grid" id="nomor"></div>

</div>

</div>

</div>

<script>

let scriptURL="https://script.google.com/macros/s/AKfycbx3X3-cdIOgs_CR03ZHPjQyTgBQJOtoInX7s9bMkCchRQot0zwlrkMyOuqKCofTmZGSTw/exec"

let soal=[

{t:"Konektor kabel LAN adalah",o:["RJ11","RJ45","BNC","FC","RCA"],a:1},
{t:"Jumlah layer OSI",o:["5","6","7","8","9"],a:2},
{t:"Perangkat penguat sinyal jaringan",o:["Router","Repeater","Hub","Switch","Bridge"],a:1},
{t:"Perangkat penghubung jaringan",o:["Router","Keyboard","Mouse","Printer","Scanner"],a:0},
{t:"Perangkat untuk membagi jaringan",o:["Hub","Switch","Monitor","CPU","Speaker"],a:1},

{t:"Kepanjangan LAN",o:["Local Area Network","Large Area Net","Line Area Network","Link Area Net","Long Area Net"],a:0},
{t:"Kepanjangan WAN",o:["Wide Area Network","World Area Net","Web Area Network","Wire Area Net","Wide Area Net"],a:0},
{t:"Media transmisi kabel",o:["UTP","WiFi","Bluetooth","Infrared","Satelit"],a:0},
{t:"Perangkat penghubung internet",o:["Modem","Mouse","Printer","Scanner","Keyboard"],a:0},
{t:"Perangkat penyebar sinyal WiFi",o:["Access Point","Monitor","CPU","Speaker","Keyboard"],a:0},

{t:"Alamat unik komputer jaringan",o:["IP Address","MAC Address","Hostname","DNS","Gateway"],a:0},
{t:"Lapisan OSI ke-1",o:["Physical","Network","Session","Transport","Application"],a:0},
{t:"Lapisan OSI ke-3",o:["Network","Transport","Session","Presentation","Physical"],a:0},
{t:"Lapisan OSI ke-4",o:["Transport","Network","Session","Physical","Application"],a:0},
{t:"Lapisan OSI ke-7",o:["Application","Session","Transport","Network","Data link"],a:0},

{t:"Perangkat untuk routing jaringan",o:["Router","Switch","Hub","Bridge","NIC"],a:0},
{t:"NIC adalah",o:["Network Interface Card","Network Internal Card","Node Internet Card","Net Interface Cable","Network Input Card"],a:0},
{t:"Topologi jaringan berbentuk bintang",o:["Star","Bus","Ring","Tree","Mesh"],a:0},
{t:"Topologi jaringan satu jalur",o:["Bus","Star","Ring","Mesh","Tree"],a:0},
{t:"Topologi melingkar",o:["Ring","Star","Bus","Mesh","Tree"],a:0},

{t:"Sistem operasi jaringan",o:["Linux Server","Windows","Android","MacOS","IOS"],a:0},
{t:"Media transmisi tanpa kabel",o:["Wireless","UTP","STP","Coaxial","Fiber"],a:0},
{t:"Perangkat keamanan jaringan",o:["Firewall","Switch","Hub","Repeater","Bridge"],a:0},
{t:"Protokol internet",o:["TCP/IP","HTTP","FTP","SMTP","POP3"],a:0},
{t:"Alamat website",o:["URL","IP","DNS","MAC","FTP"],a:0}

]

soal=soal.sort(()=>Math.random()-0.5)

let posisi=0
let jawaban=[]
let waktu=55*60
let timer

function mulai(){

if(nama.value==""||kelas.value==""){
alert("Isi nama dan kelas")
return
}

login.style.display="none"
ujian.style.display="flex"

buatNomor()
tampil()
startTimer()

}

function startTimer(){

timer=setInterval(function(){

let m=Math.floor(waktu/60)
let s=waktu%60

timer.innerHTML="Sisa waktu : "+m+":"+s

waktu--

if(waktu<0){
clearInterval(timer)
selesai()
}

},1000)

}

function buatNomor(){

let html=""

for(let i=0;i<soal.length;i++){

html+="<div id='no"+i+"' onclick='lompat("+i+")'>"+(i+1)+"</div>"

}

nomor.innerHTML=html

}

function tampil(){

let s=soal[posisi]

soal.innerHTML=(posisi+1)+". "+s.t

let html=""

s.o.forEach((o,i)=>{

html+=`
<label>
<input type="radio" name="opsi" value="${i}" onchange="jawab(${i})" ${jawaban[posisi]==i?"checked":""}>
${String.fromCharCode(65+i)}. ${o}
</label><br>
`

})

opsi.innerHTML=html

}

function jawab(i){

jawaban[posisi]=i
document.getElementById("no"+posisi).classList.add("aktif")

}

function next(){

if(posisi<soal.length-1){
posisi++
tampil()
}

}

function prev(){

if(posisi>0){
posisi--
tampil()
}

}

function lompat(i){

posisi=i
tampil()

}

function selesai(){

let benar = 0

soal.forEach((s,i)=>{
if(jawaban[i] == s.a) benar++
})

let salah = soal.length - benar

let nilai = Math.round((benar/soal.length)*100)

alert(
"HASIL UJIAN\n\n"+
"Nama : " + nama.value + "\n"+
"Kelas : " + kelas.value + "\n\n"+
"Benar : " + benar + "\n"+
"Salah : " + salah + "\n\n"+
"Nilai : " + nilai
)

fetch(scriptURL,{
method:"POST",
body: JSON.stringify({
nama: nama.value,
kelas: kelas.value,
benar: benar,
salah: salah,
nilai: nilai
})
})

}

</script>

</body>
</html>
