<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>TRYOUT UJIAN TKJ</title>

<style>

body{
font-family:Arial;
background:#eef5ee;
margin:0;
}

header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
display:flex;
gap:30px;
}

.soal-area{
flex:3;
}

.nomor-area{
flex:1;
}

.timer{
color:red;
font-weight:bold;
margin-bottom:15px;
}

.nomor-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
}

.nomor-grid div{
padding:8px;
background:#c8e6c9;
text-align:center;
border-radius:4px;
cursor:pointer;
}

.aktif{
background:#2e7d32 !important;
color:white;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:10px 16px;
margin-top:10px;
cursor:pointer;
border-radius:6px;
}

</style>

</head>

<body>

<header>
<h2>TRYOUT UJIAN TKJ</h2>
SMKN 7 LUWU
</header>

<div class="container">

<div id="login">

Nama<br> <input id="nama"><br><br>

Kelas<br> <select id="kelas">

<option value="">Pilih kelas</option>
<option>X TKJ</option>
<option>XI TKJ</option>
<option>XII TKJ</option>
</select>

<br><br>

<button onclick="mulai()">Mulai Ujian</button>

</div>

<div id="ujian" style="display:none;width:100%;display:flex;gap:30px;">

<div class="soal-area">

<div class="timer" id="timer"></div>

<h3 id="pertanyaan"></h3>

<div id="opsi"></div>

<br>

<button onclick="prev()">Sebelumnya</button> <button onclick="next()">Selanjutnya</button> <button onclick="selesai()">Selesai Ujian</button>

</div>

<div class="nomor-area">

<h4>NOMOR SOAL</h4>

<div class="nomor-grid" id="nomor"></div>

</div>

</div>

</div>

<script>

let scriptURL="https://script.google.com/macros/s/AKfycbx3X3-cdIOgs_CR03ZHPjQyTgBQJOtoInX7s9bMkCchRQot0zwlrkMyOuqKCofTmZGSTw/exec"

let dataSoal=[

{t:"Perangkat penghubung jaringan",o:["Router","Repeater","Hub","Switch","Bridge"],a:0},
{t:"Alamat website disebut",o:["URL","IP","DNS","MAC","FTP"],a:0},
{t:"Jumlah layer OSI",o:["5","6","7","8","9"],a:2},
{t:"Media transmisi kabel",o:["UTP","Wifi","Bluetooth","Infrared","Satelit"],a:0},
{t:"Kepanjangan LAN",o:["Local Area Network","Line Area Net","Long Area Net","Link Area Net","Large Area Net"],a:0},

{t:"Perangkat penyebar wifi",o:["Access Point","Monitor","CPU","Speaker","Keyboard"],a:0},
{t:"Lapisan OSI pertama",o:["Physical","Network","Session","Transport","Application"],a:0},
{t:"Topologi berbentuk bintang",o:["Star","Bus","Ring","Mesh","Tree"],a:0},
{t:"Topologi satu jalur",o:["Bus","Star","Ring","Mesh","Tree"],a:0},
{t:"Topologi melingkar",o:["Ring","Star","Bus","Mesh","Tree"],a:0},

{t:"NIC adalah",o:["Network Interface Card","Node Interface Card","Network Internal Card","Net Interface Cable","Network Input Card"],a:0},
{t:"Perangkat keamanan jaringan",o:["Firewall","Hub","Switch","Repeater","Bridge"],a:0},
{t:"Perangkat routing jaringan",o:["Router","Hub","Switch","Bridge","NIC"],a:0},
{t:"Media transmisi tanpa kabel",o:["Wireless","UTP","STP","Coaxial","Fiber"],a:0},
{t:"Sistem operasi jaringan",o:["Linux Server","Windows","Android","MacOS","IOS"],a:0},

{t:"Protokol internet",o:["TCP/IP","FTP","SMTP","POP3","HTTP"],a:0},
{t:"Perangkat penguat sinyal",o:["Repeater","Router","Switch","Bridge","Hub"],a:0},
{t:"Perangkat pembagi jaringan",o:["Switch","Monitor","CPU","Speaker","Keyboard"],a:0},
{t:"Alamat unik komputer jaringan",o:["IP Address","Hostname","DNS","MAC","Gateway"],a:0},
{t:"Konektor kabel LAN",o:["RJ45","RJ11","BNC","USB","VGA"],a:0},

{t:"Lapisan OSI ke-4",o:["Transport","Network","Session","Physical","Application"],a:0},
{t:"Lapisan OSI ke-7",o:["Application","Session","Transport","Network","Data link"],a:0},
{t:"Perangkat modem digunakan untuk",o:["Internet","Print","Scan","Copy","Audio"],a:0},
{t:"Switch bekerja pada layer",o:["Data Link","Network","Session","Transport","Application"],a:0},
{t:"DNS berfungsi untuk",o:["Menerjemahkan domain ke IP","Mengirim email","Transfer file","Mengatur IP","Keamanan jaringan"],a:0}

]

dataSoal=dataSoal.sort(()=>Math.random()-0.5)

let posisi=0
let jawaban=[]
let waktu=55*60
let timer

function mulai(){

if(nama.value==""||kelas.value==""){
alert("Isi nama dan kelas")
return
}

login.style.display="none"
ujian.style.display="flex"

buatNomor()
tampil()
startTimer()

}

function startTimer(){

timer=setInterval(function(){

let m=Math.floor(waktu/60)
let s=waktu%60

document.getElementById("timer").innerHTML="Sisa waktu : "+m+":"+s

waktu--

if(waktu<0){
clearInterval(timer)
selesai()
}

},1000)

}

function buatNomor(){

let html=""

for(let i=0;i<dataSoal.length;i++){

html+="<div id='no"+i+"' onclick='lompat("+i+")'>"+(i+1)+"</div>"

}

nomor.innerHTML=html

}

function tampil(){

let s=dataSoal[posisi]

pertanyaan.innerHTML=(posisi+1)+". "+s.t

let html=""

s.o.forEach((o,i)=>{

html+=`
<label>
<input type="radio" name="opsi" value="${i}" onchange="jawab(${i})" ${jawaban[posisi]==i?"checked":""}>
${String.fromCharCode(65+i)}. ${o}
</label><br>
`

})

opsi.innerHTML=html

}

function jawab(i){

jawaban[posisi]=i
document.getElementById("no"+posisi).classList.add("aktif")

}

function next(){

if(posisi<dataSoal.length-1){
posisi++
tampil()
}

}

function prev(){

if(posisi>0){
posisi--
tampil()
}

}

function lompat(i){

posisi=i
tampil()

}

function selesai(){

clearInterval(timer)

let benar=0

dataSoal.forEach((s,i)=>{
if(jawaban[i]==s.a) benar++
})

let salah=dataSoal.length-benar
let nilai=Math.round((benar/dataSoal.length)*100)

ujian.innerHTML=`

<div style="text-align:center;padding:40px">

<h2>HASIL TRYOUT TKJ</h2>

<h3>${nama.value}</h3>
<p>${kelas.value}</p>

<br>

<p>Benar : ${benar}</p>
<p>Salah : ${salah}</p>

<h2>Nilai : ${nilai}</h2>

<br>

<button onclick="buatSertifikat('${nama.value}',${nilai})">
Download Sertifikat
</button>

<br><br>

<a href="ranking_tryout.html">Lihat Ranking</a>

</div>

`

fetch(scriptURL,{
method:"POST",
body:JSON.stringify({
nama:nama.value,
kelas:kelas.value,
benar:benar,
salah:salah,
nilai:nilai
})
})

}
function buatSertifikat(nama,nilai){

var canvas=document.createElement("canvas")
canvas.width=1200
canvas.height=700

var ctx=canvas.getContext("2d")

// background
ctx.fillStyle="#ffffff"
ctx.fillRect(0,0,1200,700)

// border emas
ctx.strokeStyle="#d4af37"
ctx.lineWidth=12
ctx.strokeRect(30,30,1140,640)

// judul
ctx.textAlign="center"
ctx.fillStyle="#000"

ctx.font="bold 50px Arial"
ctx.fillText("SERTIFIKAT TRYOUT TKJ",600,150)

// teks
ctx.font="24px Arial"
ctx.fillText("Diberikan kepada",600,240)

// nama siswa
ctx.font="bold 40px Arial"
ctx.fillText(nama,600,310)

// keterangan
ctx.font="24px Arial"
ctx.fillText("Telah menyelesaikan Tryout TKJ",600,380)

ctx.font="bold 30px Arial"
ctx.fillText("Nilai : "+nilai,600,440)

// sekolah
ctx.font="24px Arial"
ctx.fillText("SMKN 7 LUWU",600,520)

// download
var link=document.createElement("a")
link.download="sertifikat_tryout.png"
link.href=canvas.toDataURL()

link.click()

}



</script>

</body>
</html>
