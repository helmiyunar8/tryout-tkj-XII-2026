<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>TRYOUT UJIAN TKJ</title>

<style>
body{
font-family:Arial;
background:#e8f5e9;
margin:0;
}

header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
}

.timer{
color:red;
font-weight:bold;
text-align:right;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:10px 15px;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}
</style>

</head>

<body>

<header>
<h2>TRYOUT UJIAN TKJ</h2>
SMKN 7 LUWU
</header>

<div class="container">

<div id="login">

Nama<br> <input id="nama"><br><br>

Kelas<br> <select id="kelas">

<option value="">Pilih kelas</option>
<option>X TKJ</option>
<option>XI TKJ</option>
<option>XII TKJ</option>
</select>

<br><br>

<button onclick="mulai()">Mulai Ujian</button>

</div>

<div id="ujian" style="display:none">

<div class="timer" id="timer"></div>

<h3 id="soal"></h3>

<div id="opsi"></div>

<br>

<button onclick="prev()">Sebelumnya</button> <button onclick="next()">Selanjutnya</button>

</div>

</div>

<script>

let soal=[
{t:"Konektor kabel LAN adalah",o:["RJ11","RJ45","BNC","FC","RCA"],a:1},
{t:"Perangkat penguat sinyal jaringan",o:["Router","Repeater","Hub","Switch","Bridge"],a:1},
{t:"Jumlah layer OSI",o:["5","6","7","8","9"],a:2}
]

let posisi=0
let jawaban=[]

let nama=""
let kelas=""

function mulai(){

nama=document.getElementById("nama").value
kelas=document.getElementById("kelas").value

if(nama==""||kelas==""){
alert("Isi nama dan kelas")
return
}

document.getElementById("login").style.display="none"
document.getElementById("ujian").style.display="block"

tampil()

}

function tampil(){

let s=soal[posisi]

document.getElementById("soal").innerHTML=(posisi+1)+". "+s.t

let html=""

s.o.forEach((o,i)=>{

html+=`
<label>
<input type="radio" name="opsi" value="${i}">
${String.fromCharCode(65+i)}. ${o}
</label><br>
`

})

document.getElementById("opsi").innerHTML=html

}

function next(){
if(posisi<soal.length-1){
posisi++
tampil()
}
}

function prev(){
if(posisi>0){
posisi--
tampil()
}
}

</script>

</body>
</html>
